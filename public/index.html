<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <link rel="stylesheet" href="./style.css">
    <!-- <script src="./index.js"></script> -->
    
</head>

<body>
    <div class="calculator-container p-3">
        <div>
            <input type="text" readonly id="display">
        </div>
        <div class="row btn-main-container">
            <div class="btn-container-1 col-9">
                <div>
                    <button class="clear cal-btn" onclick="clearDisplay()">C</button>
                    <button class="cal-btn op-btn" onclick="appendNum('/')">/</button>
                    <button class="cal-btn op-btn" onclick="appendNum('*')">x</button>
                </div>
                <div>
                    <button class="cal-btn" onclick="appendNum('7')">7</button>
                    <button class="cal-btn" onclick="appendNum('8')">8</button>
                    <button class="cal-btn" onclick="appendNum('9')">9</button>
                </div>
                <div>
                    <button class="cal-btn" onclick="appendNum('4')">4</button>
                    <button class="cal-btn" onclick="appendNum('5')">5</button>
                    <button class="cal-btn" onclick="appendNum('6')">6</button>
                </div>
                <div>
                    <button class="cal-btn" onclick="appendNum('1')">1</button>
                    <button class="cal-btn" onclick="appendNum('2')">2</button>
                    <button class="cal-btn" onclick="appendNum('3')">x</button>
                </div>
                <div>
                    <button class="cal-btn zero-btn" onclick="appendNum('0')">0</button>
                    <button class="cal-btn" onclick="appendNum('.')">.</button>
                </div>

            </div>
            <div class="col-3 btn-container-2">
                <button class="cal-btn op-btn" onclick="appendNum('-')">-</button>
                <button class="cal-btn op-btn" onclick="appendNum('+')">+</button>
                <button class="cal-btn op-btn equal-btn" onclick="calculate()">=</button>
            </div>
        </div>

    </div>

    <script src="./index.js"></script>
</body>

</html>
